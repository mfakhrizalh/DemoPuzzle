<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Image</title>
    <link rel="stylesheet" href="style.css">    
</head>
<body>
        <h1>Sliding Puzzle</h1>
        <button id="start-button">Start Game</button>
        
        <div id="puzzle-container"></div>

        <label>
            Image URL: <input type="text" id="image-url" value="https://picsum.photos/400">
        </label>
        <label>
            Grid Size: <input type="number" id="grid-size" value="4" min="2" max="10">
        </label>
        <label>
            Debug Mode: <input type="checkbox" id="debug-toggle">
        </label>
    

    <script src="main.js"></script>
</body>
</html>
